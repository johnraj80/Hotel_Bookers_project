<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E42"/>
      <stop offset="100%" stop-color="#0D3526"/>
    </linearGradient>
    <linearGradient id="emeraldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#246B4C"/>
      <stop offset="100%" stop-color="#164232"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D48B"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8792A"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0E0A0"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4EBE0"/>
      <stop offset="100%" stop-color="#A8D4C0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="200" height="200" rx="40" fill="url(#emeraldGrad)"/>
  <rect x="3" y="3" width="194" height="194" rx="38" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.5"/>

  <!-- Building group centered -->
  <g transform="translate(45, 26)">
    <!-- Roof / Pediment -->
    <polygon points="-12,38 55,10 122,38" fill="url(#emeraldLight)"/>
    <polygon points="4,38 55,18 106,38" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>

    <!-- Flagpole -->
    <line x1="55" y1="10" x2="55" y2="-4" stroke="url(#goldGrad)" stroke-width="1.4"/>
    <polygon points="55,-4 70,2 55,8" fill="url(#goldGrad)"/>

    <!-- Building body -->
    <rect x="0" y="34" width="110" height="136" rx="10" fill="url(#emeraldLight)"/>
    <!-- Cornice line -->
    <rect x="0" y="32" width="110" height="6" rx="0" fill="url(#goldGrad)" opacity="0.35"/>

    <!-- Windows row 1 -->
    <rect x="10" y="48" width="22" height="17" rx="3" fill="url(#windowGrad)" opacity="0.9"/>
    <rect x="44" y="48" width="22" height="17" rx="3" fill="url(#windowGrad)" opacity="0.9"/>
    <rect x="78" y="48" width="22" height="17" rx="3" fill="url(#windowGrad)" opacity="0.9"/>
    <rect x="10" y="64" width="22" height="2" rx="1" fill="url(#goldGrad)" opacity="0.5"/>
    <rect x="44" y="64" width="22" height="2" rx="1" fill="url(#goldGrad)" opacity="0.5"/>
    <rect x="78" y="64" width="22" height="2" rx="1" fill="url(#goldGrad)" opacity="0.5"/>

    <!-- Windows row 2 -->
    <rect x="10" y="74" width="22" height="17" rx="3" fill="url(#windowGrad)" opacity="0.75"/>
    <rect x="44" y="74" width="22" height="17" rx="3" fill="url(#windowGrad)" opacity="0.75"/>
    <rect x="78" y="74" width="22" height="17" rx="3" fill="url(#windowGrad)" opacity="0.75"/>

    <!-- Mid band -->
    <rect x="0" y="96" width="110" height="3" fill="url(#goldGrad)" opacity="0.3"/>

    <!-- Columns -->
    <rect x="22" y="99" width="8" height="71" rx="2" fill="url(#emeraldGrad)"/>
    <rect x="80" y="99" width="8" height="71" rx="2" fill="url(#emeraldGrad)"/>
    <rect x="18" y="96" width="16" height="5" rx="1" fill="url(#goldGrad)" opacity="0.65"/>
    <rect x="76" y="96" width="16" height="5" rx="1" fill="url(#goldGrad)" opacity="0.65"/>

    <!-- Arched door -->
    <path d="M34 170 L34 126 Q55 110 76 126 L76 170 Z" fill="url(#goldShine)" opacity="0.95"/>
    <path d="M36 126 Q55 112 74 126" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <rect x="36" y="134" width="16" height="18" rx="2" fill="url(#goldGrad)" opacity="0.3"/>
    <rect x="58" y="134" width="16" height="18" rx="2" fill="url(#goldGrad)" opacity="0.3"/>
    <circle cx="70" cy="152" r="3" fill="url(#emeraldGrad)"/>

    <!-- Steps -->
    <rect x="16" y="170" width="78" height="6" rx="2" fill="url(#emeraldGrad)" opacity="0.8"/>
    <rect x="8"  y="175" width="94" height="4" rx="1" fill="url(#goldGrad)" opacity="0.2"/>

    <!-- Key badge -->
    <g transform="translate(72, 118)">
      <circle cx="19" cy="19" r="20" fill="url(#emeraldGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>
      <circle cx="19" cy="12" r="6.5" fill="none" stroke="url(#goldGrad)" stroke-width="2.2"/>
      <rect x="17.2" y="17" width="3.5" height="12" rx="1.2" fill="url(#goldGrad)"/>
      <rect x="20.7" y="21" width="4.2" height="2.5" rx="0.6" fill="url(#goldGrad)"/>
      <rect x="20.7" y="25" width="3" height="2" rx="0.6" fill="url(#goldGrad)"/>
    </g>
  </g>
</svg>
